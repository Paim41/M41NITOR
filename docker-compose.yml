services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: televault
      POSTGRES_PASSWORD: televault_dev_password
      POSTGRES_DB: televault
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U televault -d televault"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://televault:televault_dev_password@postgres:5432/televault
    ports:
      - "3000:3000"
    volumes:
      - temp-uploads:/tmp/televault

volumes:
  postgres-data:
  temp-uploads:
